<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Leave A Note</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

/* HOME SCREEN */
#home {
  position: fixed;
  inset: 0;
  background: white;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  z-index: 20;
}

#home img {
  width: 80%;
  max-width: 500px;
}

/* MAP */
#map-container {
  position: fixed;
  inset: 0;
  overflow: scroll;
  background: #f5f5f5;
}

#map {
  position: relative;
  width: 4000px;
  height: 4000px;
  background: white;
}

/* ADD NOTE BUTTON */
#addNoteBtn {
  position: fixed;
  top: 20px;
  left: 20px;
  padding: 12px 20px;
  background: #222;
  color: white;
  border-radius: 8px;
  cursor: pointer;
  z-index: 10;
  font-weight: bold;
}

/* NOTE */
.note {
  position: absolute;
  width: 200px;
  height: 200px;
  cursor: pointer;
  transition: transform 0.25s ease;
}

.note.zoom {
  transform: scale(3);
  z-index: 9999;
}

/* REPORT BUTTON */
.reportBtn {
  position: absolute;
  top: 5px;
  right: 5px;
  display: none;
  font-size: 20px;
  cursor: pointer;
}

.note.zoom .reportBtn {
  display: block;
}

/* EDITOR */
#editor {
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.95);
  display: none;
  flex-direction: column;
  align-items: center;
  padding-top: 20px;
}

#canvas {
  width: 500px;
  height: 500px;
  background: transparent;
  border: none;
}

.tools {
  margin-top: 10px;
  display: flex;
  gap: 10px;
}

button {
  padding: 10px 15px;
  font-size: 16px;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="home">
  <img src="images/Leave_A_Note-removebg-preview.png">
</div>

<div id="addNoteBtn" style="display:none;">ADD NOTE</div>

<div id="map-container">
  <div id="map"></div>
</div>

<div id="editor">
  <canvas id="canvas" width="500" height="500"></canvas>

  <div class="tools">
    <button onclick="setTool('draw')">Draw</button>
    <button onclick="setTool('erase')">Erase</button>
    <button onclick="setTool('text')">Text</button>
    <input type="color" id="colorPicker" value="#000000">
    <button onclick="finishNote()">Done</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyBzk5p9naKjZndFHfqpldxGUMLBGzkDIsU",
  authDomain: "antianti-69313.firebaseapp.com",
  databaseURL: "https://antianti-69313-default-rtdb.firebaseio.com",
  projectId: "antianti-69313",
  storageBucket: "antianti-69313.firebasestorage.app",
  messagingSenderId: "147709968684",
  appId: "1:147709968684:web:696108f146ecda9b5eec89"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const notesRef = ref(db, "notes");

/* ELEMENTS */
const home = document.getElementById("home");
const addNoteBtn = document.getElementById("addNoteBtn");
const map = document.getElementById("map");
const mapContainer = document.getElementById("map-container");
const editor = document.getElementById("editor");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const colorPicker = document.getElementById("colorPicker");

/* STATE */
let tool = "draw";
let drawing = false;
let placing = false;
let preview = null;
let noteImage = null;
let noteMask = null;
const notesCache = new Map();

/* HOME */
home.onclick = () => {
  home.style.display = "none";
  addNoteBtn.style.display = "block";
};

/* OPEN EDITOR */
addNoteBtn.onclick = () => {
  editor.style.display = "flex";
  addNoteBtn.style.display = "none";

  const img = new Image();
  img.src = "images/note-removebg-preview.png";
  img.onload = () => {
    ctx.clearRect(0,0,500,500);
    ctx.drawImage(img, 0, 0, 500, 500);

    noteMask = document.createElement("canvas");
    noteMask.width = 500;
    noteMask.height = 500;
    noteMask.getContext("2d").drawImage(img,0,0,500,500);
  };
};

/* TOOL */
window.setTool = t => tool = t;

/* DRAW */
canvas.onmousedown = e => {
  drawing = true;
  ctx.beginPath();
  ctx.moveTo(e.offsetX, e.offsetY);
};

canvas.onmousemove = e => {
  if (!drawing || !noteMask) return;

  const x = e.offsetX;
  const y = e.offsetY;

  const pixel = noteMask.getContext("2d").getImageData(x,y,1,1).data;
  if (pixel[3] === 0) return;

  ctx.strokeStyle = tool === "erase" ? "white" : colorPicker.value;
  ctx.lineWidth = tool === "erase" ? 20 : 3;

  ctx.lineTo(x,y);
  ctx.stroke();
};

canvas.onmouseup = () => drawing = false;

/* TEXT */
canvas.onclick = e => {
  if (tool === "text") {
    const t = prompt("Text:");
    if (t) {
      ctx.fillStyle = colorPicker.value;
      ctx.font = "24px Arial";
      ctx.fillText(t, e.offsetX, e.offsetY);
    }
  }
};

/* CREATE NOTE ELEMENT */
function createNote(id, d) {
  if (notesCache.has(id)) return;

  const note = document.createElement("div");
  note.className = "note";
  note.style.left = d.x + "px";
  note.style.top = d.y + "px";

  const img = document.createElement("img");
  img.src = d.image;
  img.style.width = "100%";

  const report = document.createElement("div");
  report.className = "reportBtn";
  report.innerHTML = `<i class="fa-solid fa-flag" style="color:red;"></i>`;

  report.onclick = ev => {
    ev.stopPropagation();
    update(ref(db, "notes/" + id), { reported: true });
  };

  note.appendChild(img);
  note.appendChild(report);

  note.onclick = () => {
    note.classList.toggle("zoom");
  };

  map.appendChild(note);
  notesCache.set(id, note);
}

/* FINISH */
window.finishNote = () => {
  editor.style.display = "none";
  addNoteBtn.style.display = "block";

  noteImage = canvas.toDataURL();
  placing = true;

  preview = document.createElement("img");
  preview.src = noteImage;
  preview.className = "note";
  preview.style.opacity = "0.5";
  map.appendChild(preview);
};

/* PREVIEW MOVE */
mapContainer.addEventListener("mousemove", e => {
  if (!placing || !preview) return;

  const rect = mapContainer.getBoundingClientRect();
  const x = e.pageX - rect.left + mapContainer.scrollLeft - 100;
  const y = e.pageY - rect.top + mapContainer.scrollTop - 100;

  preview.style.left = x + "px";
  preview.style.top = y + "px";
});

/* PLACE (FIXED PROPERLY) */
mapContainer.addEventListener("click", e => {
  if (!placing) return;

  const rect = mapContainer.getBoundingClientRect();
  const x = e.pageX - rect.left + mapContainer.scrollLeft - 100;
  const y = e.pageY - rect.top + mapContainer.scrollTop - 100;

  const refPush = push(notesRef);
  const id = refPush.key;

  const data = { x, y, image: noteImage, reported: false };

  createNote(id, data); // instant render
  update(refPush, data); // save

  placing = false;
  if (preview) preview.remove();
});

/* LOAD */
onValue(notesRef, snapshot => {
  snapshot.forEach(child => {
    createNote(child.key, child.val());
  });
});
</script>

</body>
</html>

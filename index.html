<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Leave A Note</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

/* HOME SCREEN */
#home {
  position: fixed;
  inset: 0;
  background: white;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  z-index: 10;
}

#home img {
  width: 80%;
  max-width: 500px;
}

/* MAP */
#map-container {
  position: fixed;
  inset: 0;
  overflow: scroll;
  background: #f5f5f5;
}

#map {
  position: relative;
  width: 4000px;
  height: 4000px;
  background: white;
}

/* ADD NOTE BUTTON */
#addNoteBtn {
  position: fixed;
  top: 20px;
  left: 20px;
  padding: 12px 20px;
  background: #222;
  color: white;
  border-radius: 8px;
  cursor: pointer;
  z-index: 5;
  font-weight: bold;
}

/* NOTE ON MAP */
.note {
  position: absolute;
  width: 200px;
  height: 200px;
  cursor: pointer;
  overflow: hidden;
}

.note img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* EDITOR OVERLAY */
#editor {
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.95);
  display: none;
  flex-direction: column;
  align-items: center;
  padding-top: 20px;
  z-index: 20;
}

#editor canvas {
  border: 2px solid #000;
  background: white;
}

.tools {
  margin-top: 10px;
  display: flex;
  gap: 10px;
}

button {
  padding: 10px 15px;
  font-size: 16px;
  cursor: pointer;
}

/* EXPANDED NOTE VIEW */
#expanded {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 30;
}

#expanded img {
  width: 80%;
  max-width: 600px;
  border: 4px solid white;
  background: white;
}
</style>
</head>
<body>

<!-- HOME SCREEN -->
<div id="home">
  <img src="images/Leave_A_Note-removebg-preview.png">
</div>

<!-- ADD NOTE BUTTON -->
<div id="addNoteBtn" style="display:none;">ADD NOTE</div>

<!-- MAP -->
<div id="map-container">
  <div id="map"></div>
</div>

<!-- EDITOR -->
<div id="editor">
  <canvas id="canvas" width="400" height="400"></canvas>

  <div class="tools">
    <button onclick="setTool('draw')">Draw</button>
    <button onclick="setTool('erase')">Erase</button>
    <button onclick="setTool('text')">Text</button>
    <input type="color" id="colorPicker" value="#000000">
    <button onclick="finishNote()">Done</button>
  </div>
</div>

<!-- EXPANDED NOTE VIEW -->
<div id="expanded" onclick="this.style.display='none'">
  <img id="expandedImg">
</div>

<script>
const home = document.getElementById("home");
const addNoteBtn = document.getElementById("addNoteBtn");
const mapContainer = document.getElementById("map-container");
const map = document.getElementById("map");
const editor = document.getElementById("editor");
const canvas = document.getElementById("canvas");
const colorPicker = document.getElementById("colorPicker");
const expanded = document.getElementById("expanded");
const expandedImg = document.getElementById("expandedImg");

let ctx = canvas.getContext("2d");
let tool = "draw";
let drawing = false;
let pendingNoteImage = null; // dataURL waiting to be placed
let placingNote = false;

/* HOME SCREEN CLICK */
home.onclick = () => {
  home.style.display = "none";
  addNoteBtn.style.display = "block";
};

/* ADD NOTE */
addNoteBtn.onclick = () => {
  openEditor();
};

function openEditor() {
  editor.style.display = "flex";
  ctx.clearRect(0,0,400,400);

  // draw the note image as the canvas background
  const bg = new Image();
  bg.src = "images/note-removebg-preview.png";
  bg.onload = () => {
    ctx.drawImage(bg, 0, 0, canvas.width, canvas.height);
  };

  tool = "draw";
}

/* TOOL SELECT */
function setTool(t) {
  tool = t;
}

/* DRAWING */
canvas.onmousedown = e => {
  drawing = true;
  ctx.beginPath();
  ctx.moveTo(e.offsetX, e.offsetY);
};

canvas.onmousemove = e => {
  if (!drawing) return;

  if (tool === "draw") {
    ctx.strokeStyle = colorPicker.value;
    ctx.lineWidth = 3;
  } else if (tool === "erase") {
    ctx.strokeStyle = "white";
    ctx.lineWidth = 20;
  }

  ctx.lineTo(e.offsetX, e.offsetY);
  ctx.stroke();
};

canvas.onmouseup = () => drawing = false;
canvas.onmouseleave = () => drawing = false;

/* TEXT TOOL */
canvas.onclick = e => {
  if (tool === "text") {
    let t = prompt("Enter text:");
    if (t) {
      ctx.fillStyle = colorPicker.value;
      ctx.font = "20px Arial";
      ctx.fillText(t, e.offsetX, e.offsetY);
    }
  }
};

/* FINISH NOTE: go into placement mode */
function finishNote() {
  editor.style.display = "none";
  pendingNoteImage = canvas.toDataURL();
  placingNote = true;
}

/* PLACE NOTE ON MAP WHERE YOU TAP/CLICK */
function placeNoteAt(pageX, pageY) {
  if (!placingNote || !pendingNoteImage) return;

  const rect = mapContainer.getBoundingClientRect();
  const xOnMap = pageX - rect.left + mapContainer.scrollLeft;
  const yOnMap = pageY - rect.top + mapContainer.scrollTop;

  const note = document.createElement("div");
  note.className = "note";
  note.style.left = (xOnMap - 100) + "px";
  note.style.top = (yOnMap - 100) + "px";

  const img = document.createElement("img");
  img.src = pendingNoteImage;
  note.appendChild(img);

  note.addEventListener("click", e => {
    e.stopPropagation();
    expandNote(pendingNoteImage);
  });

  makeDraggable(note);
  map.appendChild(note);

  placingNote = false;
  pendingNoteImage = null;
}

/* MAP CLICK/TAP HANDLERS FOR PLACEMENT */
mapContainer.addEventListener("click", e => {
  if (placingNote) {
    placeNoteAt(e.pageX, e.pageY);
  }
});

mapContainer.addEventListener("touchstart", e => {
  if (!placingNote) return;
  const t = e.touches[0];
  placeNoteAt(t.pageX, t.pageY);
});

/* DRAGGING NOTES */
function makeDraggable(el) {
  let offsetX, offsetY;

  el.onmousedown = e => {
    e.stopPropagation();
    offsetX = e.offsetX;
    offsetY = e.offsetY;

    document.onmousemove = ev => {
      const rect = mapContainer.getBoundingClientRect();
      const xOnMap = ev.pageX - rect.left + mapContainer.scrollLeft;
      const yOnMap = ev.pageY - rect.top + mapContainer.scrollTop;
      el.style.left = (xOnMap - offsetX) + "px";
      el.style.top = (yOnMap - offsetY) + "px";
    };

    document.onmouseup = () => {
      document.onmousemove = null;
    };
  };
}

/* EXPAND NOTE */
function expandNote(src) {
  expandedImg.src = src;
  expanded.style.display = "flex";
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Leave A Note</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

/* HOME */
#home {
  position: fixed;
  inset: 0;
  background: white;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  z-index: 20;
}

#home img {
  width: 80%;
  max-width: 500px;
}

/* MAP */
#map-container {
  position: fixed;
  inset: 0;
  overflow: scroll;
  background: #f5f5f5;
  z-index: 1;
}

#map {
  position: relative;
  width: 4000px;
  height: 4000px;
  background: white;
}

/* BUTTON */
#addNoteBtn {
  position: fixed;
  top: 20px;
  left: 20px;
  padding: 12px 20px;
  background: #222;
  color: white;
  border-radius: 8px;
  cursor: pointer;
  z-index: 10;
  font-weight: bold;
}

/* NOTES */
.note {
  position: absolute;
  cursor: pointer;
  width: auto;
  height: auto;
  transition: transform 0.25s ease;
}

.note.zoom {
  transform: scale(3);
  z-index: 9999;
}

/* PREVIEW FIX */
.note.preview {
  opacity: 0.5;
  pointer-events: none; /* IMPORTANT FIX */
}

/* EDITOR */
#editor {
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.95);
  display: none;
  flex-direction: column;
  align-items: center;
  padding-top: 20px;
  z-index: 30;
}

#canvas {
  border: none;
  background: transparent;
}

.tools {
  margin-top: 10px;
  display: flex;
  gap: 10px;
}

button {
  padding: 10px 15px;
  font-size: 16px;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="home">
  <img src="images/Leave_A_Note-removebg-preview.png">
</div>

<div id="addNoteBtn" style="display:none;">ADD NOTE</div>

<div id="map-container">
  <div id="map"></div>
</div>

<div id="editor">
  <canvas id="canvas"></canvas>

  <div class="tools">
    <button onclick="setTool('draw')">Draw</button>
    <button onclick="setTool('erase')">Erase</button>
    <button onclick="setTool('text')">Text</button>
    <input type="color" id="colorPicker" value="#000000">
    <button onclick="finishNote()">Done</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyBzk5p9naKjZndFHfqpldxGUMLBGzkDIsU",
  authDomain: "antianti-69313.firebaseapp.com",
  databaseURL: "https://antianti-69313-default-rtdb.firebaseio.com",
  projectId: "antianti-69313",
  storageBucket: "antianti-69313.firebasestorage.app",
  messagingSenderId: "147709968684",
  appId: "1:147709968684:web:696108f146ecda9b5eec89"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const notesRef = ref(db, "notes");

/* ELEMENTS */
const home = document.getElementById("home");
const addNoteBtn = document.getElementById("addNoteBtn");
const mapContainer = document.getElementById("map-container");
const map = document.getElementById("map");
const editor = document.getElementById("editor");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const colorPicker = document.getElementById("colorPicker");

/* STATE */
let tool = "draw";
let drawing = false;
let placing = false;
let preview = null;
let noteImage = null;

/* HOME */
home.onclick = () => {
  home.style.display = "none";
  addNoteBtn.style.display = "block";
};

/* OPEN EDITOR */
addNoteBtn.onclick = () => {
  editor.style.display = "flex";
  addNoteBtn.style.display = "none";

  const img = new Image();
  img.src = "images/note-removebg-preview.png";

  img.onload = () => {
    /* AUTO-CROP NOTE PNG */
    const temp = document.createElement("canvas");
    temp.width = img.width;
    temp.height = img.height;
    const tctx = temp.getContext("2d");
    tctx.drawImage(img, 0, 0);

    const data = tctx.getImageData(0, 0, temp.width, temp.height);
    let minX = temp.width, minY = temp.height, maxX = 0, maxY = 0;

    for (let y = 0; y < temp.height; y++) {
      for (let x = 0; x < temp.width; x++) {
        const a = data.data[(y * temp.width + x) * 4 + 3];
        if (a > 5) {
          if (x < minX) minX = x;
          if (y < minY) minY = y;
          if (x > maxX) maxX = x;
          if (y > maxY) maxY = y;
        }
      }
    }

    const w = maxX - minX;
    const h = maxY - minY;

    canvas.width = w;
    canvas.height = h;

    ctx.clearRect(0, 0, w, h);
    ctx.drawImage(img, minX, minY, w, h, 0, 0, w, h);
  };
};

/* TOOL */
window.setTool = (t) => tool = t;

/* DRAW */
canvas.onmousedown = e => {
  drawing = true;
  ctx.beginPath();
  ctx.moveTo(e.offsetX, e.offsetY);
};

canvas.onmousemove = e => {
  if (!drawing) return;

  ctx.strokeStyle = (tool === "erase") ? "rgba(0,0,0,0)" : colorPicker.value;
  ctx.lineWidth = (tool === "erase") ? 20 : 3;

  if (tool === "erase") {
    ctx.globalCompositeOperation = "destination-out";
  } else {
    ctx.globalCompositeOperation = "source-over";
  }

  ctx.lineTo(e.offsetX, e.offsetY);
  ctx.stroke();
};

canvas.onmouseup = () => {
  drawing = false;
  ctx.globalCompositeOperation = "source-over";
};

/* TEXT */
canvas.onclick = e => {
  if (tool === "text") {
    const t = prompt("Text:");
    if (t) {
      ctx.fillStyle = colorPicker.value;
      ctx.font = "24px Arial";
      ctx.fillText(t, e.offsetX, e.offsetY);
    }
  }
};

/* FINISH */
window.finishNote = () => {
  editor.style.display = "none";
  addNoteBtn.style.display = "block";

  noteImage = canvas.toDataURL();
  placing = true;

  preview = document.createElement("img");
  preview.src = noteImage;
  preview.className = "note preview";
  map.appendChild(preview);
};

/* PREVIEW MOVE */
mapContainer.addEventListener("mousemove", e => {
  if (!placing || !preview) return;

  const rect = mapContainer.getBoundingClientRect();
  const x = e.pageX - rect.left + mapContainer.scrollLeft - preview.width / 2;
  const y = e.pageY - rect.top + mapContainer.scrollTop - preview.height / 2;

  preview.style.left = x + "px";
  preview.style.top = y + "px";
});

/* PLACE NOTE */
mapContainer.addEventListener("click", e => {
  if (!placing) return;

  const rect = mapContainer.getBoundingClientRect();
  const x = e.pageX - rect.left + mapContainer.scrollLeft - preview.width / 2;
  const y = e.pageY - rect.top + mapContainer.scrollTop - preview.height / 2;

  push(notesRef, { x, y, image: noteImage });

  placing = false;
  if (preview) preview.remove();
});

/* LOAD NOTES */
onValue(notesRef, snapshot => {
  map.querySelectorAll(".note:not(.preview)").forEach(n => n.remove());

  snapshot.forEach(child => {
    const d = child.val();

    const note = document.createElement("img");
    note.src = d.image;
    note.className = "note";
    note.style.left = d.x + "px";
    note.style.top = d.y + "px";

    note.onclick = e => {
      e.stopPropagation();
      note.classList.toggle("zoom");
    };

    map.appendChild(note);
  });
});
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Leave A Note</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body { margin:0; font-family:Arial; }

/* HOME */
#home {
  position:fixed; inset:0;
  background:white;
  display:flex; justify-content:center; align-items:center;
  z-index:20;
}

#home img.main {
  width:80%;
  max-width:500px;
}

#home img.update {
  position:absolute;
  bottom:20px;
  right:20px;
  width:65%;
  max-width:420px;
}

@media (max-width:600px){
  #home img.update {
    width:55%;
    bottom:12px;
    right:12px;
  }
}

/* MAP */
#map-container {
  position:fixed;
  inset:0;
  overflow:scroll;
  background:#f5f5f5;
}

#map {
  position:relative;
  width:4000px;
  height:4000px;
  background:white;
}

#map-container.faded { opacity:0.3; }

/* BUTTON */
#addNoteBtn {
  position:fixed;
  top:20px;
  left:20px;
  padding:12px 20px;
  background:#222;
  color:white;
  border-radius:8px;
  cursor:pointer;
  z-index:10;
}

/* NOTE */
.note {
  position:absolute;
  width:170px;
  height:170px;
  cursor:pointer;
}

.note img {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:contain;
}

.note.zoom {
  transform:scale(3);
  z-index:9999;
}

/* REPORT */
.reportBtn {
  position:absolute;
  bottom:5px;
  right:5px;
  display:none;
}

.note.zoom .reportBtn {
  display:block;
}

/* DATE */
.dateTag {
  position:absolute;
  bottom:5px;
  left:5px;
  font-size:12px;
  color:black;
}

/* EDITOR */
#editor {
  position:fixed;
  inset:0;
  background:rgba(255,255,255,0.9);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

#canvas {
  width:500px;
  height:500px;
  touch-action:none;
  border:1px solid #ccc;
}

#cancelBtn {
  position:absolute;
  top:20px;
  left:20px;
  font-size:28px;
  cursor:pointer;
}

.tools {
  margin-top:10px;
  display:flex;
  gap:15px;
  align-items:center;
}
</style>
</head>

<body>

<div id="home">
  <img class="main" src="images/Leave_A_Note__1_-removebg-preview.png">
  <img class="update" src="images/new_update-removebg-preview.png">
</div>

<div id="addNoteBtn" style="display:none;">CREATE NOTE</div>

<div id="map-container">
  <div id="map"></div>
</div>

<div id="editor">
  <div id="cancelBtn">
    <i class="fa-solid fa-circle-xmark"></i>
  </div>

  <canvas id="canvas" width="500" height="500"></canvas>

  <div class="tools">
    <i onclick="setTool('draw')" class="fa-solid fa-pen"></i>
    <i onclick="setTool('erase')" class="fa-solid fa-eraser"></i>
    <i onclick="setTool('text')" class="fa-regular fa-comment-dots"></i>
    <input type="color" id="colorPicker">
    <input type="range" id="fontSize" min="10" max="60" value="24">
    <button onclick="finishNote()">Done</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
  apiKey:"AIza...",
  authDomain:"antianti-69313.firebaseapp.com",
  databaseURL:"https://antianti-69313-default-rtdb.firebaseio.com",
  projectId:"antianti-69313"
});

const db = getDatabase(app);
const notesRef = ref(db,"notes");

const home = document.getElementById("home");
const addBtn = document.getElementById("addNoteBtn");
const map = document.getElementById("map");
const mapContainer = document.getElementById("map-container");
const editor = document.getElementById("editor");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const colorPicker = document.getElementById("colorPicker");
const fontSize = document.getElementById("fontSize");

let tool="draw";
let drawing=false;
let placing=false;
let preview=null;
let noteImage=null;

/* HOME */
home.onclick=()=>{
  home.style.display="none";
  addBtn.style.display="block";
};

/* EDITOR */
addBtn.onclick=()=>{
  editor.style.display="flex";
  addBtn.style.display="none";
  mapContainer.classList.add("faded");

  const img=new Image();
  img.src="images/Untitled design.jpg";
  img.onload=()=>ctx.drawImage(img,0,0,500,500);
};

document.getElementById("cancelBtn").onclick=()=>{
  editor.style.display="none";
  addBtn.style.display="block";
  mapContainer.classList.remove("faded");
};

window.setTool=t=>tool=t;

/* DRAW (pointer = mobile + desktop) */
canvas.onpointerdown=e=>{
  drawing=true;
  const r=canvas.getBoundingClientRect();
  ctx.beginPath();
  ctx.moveTo(e.clientX-r.left,e.clientY-r.top);
};

canvas.onpointermove=e=>{
  if(!drawing)return;
  const r=canvas.getBoundingClientRect();

  if(tool==="erase"){
    ctx.globalCompositeOperation="destination-out";
    ctx.lineWidth=25;
  } else {
    ctx.globalCompositeOperation="source-over";
    ctx.strokeStyle=colorPicker.value;
    ctx.lineWidth=3;
  }

  ctx.lineTo(e.clientX-r.left,e.clientY-r.top);
  ctx.stroke();
};

canvas.onpointerup=()=>{
  drawing=false;
  ctx.globalCompositeOperation="source-over";
};

/* TEXT (FULL VERSION BACK) */
canvas.onclick=e=>{
  if(tool!=="text")return;

  let text=prompt("Text:");
  if(!text)return;

  let size=parseInt(fontSize.value);
  let maxWidth=420;

  function wrap(t){
    ctx.font=size+"px Arial";
    let words=t.split(" "),lines=[],line="";
    for(let w of words){
      let test=line+w+" ";
      if(ctx.measureText(test).width>maxWidth){
        lines.push(line);
        line=w+" ";
      } else line=test;
    }
    lines.push(line);
    return lines;
  }

  let lines=wrap(text);

  while(lines.length*size>420 && size>10){
    size--;
    lines=wrap(text);
  }

  ctx.font=size+"px Arial";
  ctx.fillStyle=colorPicker.value;

  lines.forEach((l,i)=>{
    ctx.fillText(l,e.offsetX,e.offsetY+i*size);
  });
};

/* FINISH */
window.finishNote=()=>{
  editor.style.display="none";
  addBtn.style.display="block";
  mapContainer.classList.remove("faded");

  noteImage=canvas.toDataURL();
  placing=true;

  preview=document.createElement("img");
  preview.src=noteImage;
  preview.className="note";
  preview.style.opacity=0.5;
  map.appendChild(preview);
};

/* POSITION */
function getPos(clientX,clientY){
  const rect=map.getBoundingClientRect();
  return {
    x:clientX-rect.left+mapContainer.scrollLeft,
    y:clientY-rect.top+mapContainer.scrollTop
  };
}

/* TOUCH + MOUSE PREVIEW */
mapContainer.addEventListener("mousemove",e=>{
  if(!placing)return;
  const p=getPos(e.clientX,e.clientY);
  preview.style.left=(p.x-85)+"px";
  preview.style.top=(p.y-85)+"px";
});

mapContainer.addEventListener("touchmove",e=>{
  if(!placing)return;
  const t=e.touches[0];
  const p=getPos(t.clientX,t.clientY);
  preview.style.left=(p.x-85)+"px";
  preview.style.top=(p.y-85)+"px";
});

/* PLACE */
function placeFinal(p){
  const r=push(notesRef);
  const data={
    x:p.x-85,
    y:p.y-85,
    image:noteImage,
    created:Date.now(),
    reported:false
  };

  createNote(r.key,data);
  update(r,data);

  placing=false;
  preview.remove();
}

mapContainer.addEventListener("click",e=>{
  if(!placing)return;
  placeFinal(getPos(e.clientX,e.clientY));
});

mapContainer.addEventListener("touchend",e=>{
  if(!placing)return;
  const t=e.changedTouches[0];
  placeFinal(getPos(t.clientX,t.clientY));
});

/* NOTE */
function createNote(id,d){
  const n=document.createElement("div");
  n.className="note";
  n.style.left=d.x+"px";
  n.style.top=d.y+"px";

  const bg=document.createElement("img");
  bg.src="images/note-removebg-preview.png";

  const content=document.createElement("img");
  content.src=d.image;

  const flag=document.createElement("div");
  flag.className="reportBtn";
  flag.innerHTML='<i class="fa-solid fa-flag" style="color:red;"></i>';

  flag.onclick=e=>{
    e.stopPropagation();
    update(ref(db,"notes/"+id),{reported:true});
  };

  n.onclick=()=>{
    n.classList.toggle("zoom");

    const existing=n.querySelector(".dateTag");

    if(n.classList.contains("zoom")){
      if(!existing){
        const dTag=document.createElement("div");
        dTag.className="dateTag";

        const date=new Date(d.created);
        dTag.innerText=date.toLocaleDateString();

        n.appendChild(dTag);
      }
    } else {
      if(existing) existing.remove();
    }
  };

  n.appendChild(bg);
  n.appendChild(content);
  n.appendChild(flag);
  map.appendChild(n);
}

/* LOAD */
onValue(notesRef,snap=>{
  map.querySelectorAll(".note").forEach(n=>n.remove());
  snap.forEach(c=>createNote(c.key,c.val()));
});
</script>

</body>
</html>

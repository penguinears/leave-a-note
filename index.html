<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Leave A Note</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

/* HOME */
#home {
  position: fixed;
  inset: 0;
  background: white;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  z-index: 20;
}

#home img {
  width: 80%;
  max-width: 500px;
}

/* MAP */
#map-container {
  position: fixed;
  inset: 0;
  overflow: scroll;
  background: #f5f5f5;
}

#map {
  position: relative;
  width: 4000px;
  height: 4000px;
  background: white;
}

/* BUTTON */
#addNoteBtn {
  position: fixed;
  top: 20px;
  left: 20px;
  padding: 12px 20px;
  background: #222;
  color: white;
  border-radius: 8px;
  cursor: pointer;
  z-index: 10;
  font-weight: bold;
}

/* NOTE */
.note {
  position: absolute;
  width: 200px;
  height: 200px;
  cursor: pointer;
  transition: transform 0.25s ease;
}

.note.zoom {
  transform: scale(3);
  z-index: 9999;
}

/* REPORT */
.reportBtn {
  position: absolute;
  bottom: 5px;
  right: 5px;
  font-size: 18px;
  cursor: pointer;
  display: none;
}

.note.zoom .reportBtn {
  display: block;
}

/* DATE */
.dateTag {
  position: absolute;
  bottom: 5px;
  left: 5px;
  font-size: 11px;
  background: rgba(0,0,0,0.5);
  color: white;
  padding: 3px 6px;
  border-radius: 5px;
}

/* EDITOR */
#editor {
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.95);
  display: none;
  flex-direction: column;
  align-items: center;
  padding-top: 20px;
}

#canvas {
  width: 500px;
  height: 500px;
  background: transparent;
  border: none;
}

.tools {
  margin-top: 10px;
  display: flex;
  gap: 10px;
}

button {
  padding: 10px 15px;
  font-size: 16px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home">
  <img src="images/Leave_A_Note-removebg-preview.png">
</div>

<!-- ADD -->
<div id="addNoteBtn" style="display:none;">ADD NOTE</div>

<!-- MAP -->
<div id="map-container">
  <div id="map"></div>
</div>

<!-- EDITOR -->
<div id="editor">
  <canvas id="canvas" width="500" height="500"></canvas>

  <div class="tools">
    <button onclick="setTool('draw')">Draw</button>
    <button onclick="setTool('erase')">Erase</button>
    <button onclick="setTool('text')">Text</button>
    <input type="color" id="colorPicker" value="#000000">
    <button onclick="finishNote()">Done</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyBzk5p9naKjZndFHfqpldxGUMLBGzkDIsU",
  authDomain: "antianti-69313.firebaseapp.com",
  databaseURL: "https://antianti-69313-default-rtdb.firebaseio.com",
  projectId: "antianti-69313",
  storageBucket: "antianti-69313.firebasestorage.app",
  messagingSenderId: "147709968684",
  appId: "1:147709968684:web:696108f146ecda9b5eec89"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const notesRef = ref(db, "notes");

/* ELEMENTS */
const home = document.getElementById("home");
const addNoteBtn = document.getElementById("addNoteBtn");
const map = document.getElementById("map");
const mapContainer = document.getElementById("map-container");
const editor = document.getElementById("editor");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const colorPicker = document.getElementById("colorPicker");

/* STATE */
let tool = "draw";
let drawing = false;
let placing = false;
let preview = null;
let noteImage = null;
let noteMask = null;

/* HOME */
home.onclick = () => {
  home.style.display = "none";
  addNoteBtn.style.display = "block";
};

/* OPEN EDITOR */
addNoteBtn.onclick = () => {
  editor.style.display = "flex";
  addNoteBtn.style.display = "none";

  const img = new Image();
  img.src = "images/note-removebg-preview.png";

  img.onload = () => {
    ctx.clearRect(0,0,500,500);
    ctx.drawImage(img, 0, 0, 500, 500);

    noteMask = document.createElement("canvas");
    noteMask.width = 500;
    noteMask.height = 500;
    noteMask.getContext("2d").drawImage(img,0,0,500,500);
  };
};

/* TOOL */
window.setTool = (t) => tool = t;

/* DRAW / ERASE */
canvas.onmousedown = e => {
  drawing = true;
  ctx.beginPath();
  ctx.moveTo(e.offsetX, e.offsetY);
};

canvas.onmousemove = e => {
  if (!drawing || !noteMask) return;

  const x = e.offsetX;
  const y = e.offsetY;

  const pixel = noteMask.getContext("2d").getImageData(x,y,1,1).data;
  if (pixel[3] === 0) return;

  if (tool === "erase") {
    ctx.globalCompositeOperation = "destination-out";
    ctx.strokeStyle = "rgba(0,0,0,1)";
    ctx.lineWidth = 25;
  } else {
    ctx.globalCompositeOperation = "source-over";
    ctx.strokeStyle = colorPicker.value;
    ctx.lineWidth = 3;
  }

  ctx.lineTo(x,y);
  ctx.stroke();
};

canvas.onmouseup = () => {
  drawing = false;
  ctx.globalCompositeOperation = "source-over";
};

/* TEXT AUTO FIT */
canvas.onclick = e => {
  if (tool !== "text") return;

  const text = prompt("Text:");
  if (!text) return;

  ctx.fillStyle = colorPicker.value;

  let size = 40;
  ctx.font = size + "px Arial";

  while (ctx.measureText(text).width > 420 && size > 10) {
    size--;
    ctx.font = size + "px Arial";
  }

  ctx.fillText(text, e.offsetX, e.offsetY);
};

/* FINISH */
window.finishNote = () => {
  editor.style.display = "none";
  addNoteBtn.style.display = "block";

  noteImage = canvas.toDataURL();
  placing = true;

  preview = document.createElement("img");
  preview.src = noteImage;
  preview.className = "note";
  preview.style.opacity = "0.5";
  map.appendChild(preview);
};

/* MOVE PREVIEW */
mapContainer.addEventListener("mousemove", e => {
  if (!placing || !preview) return;

  const rect = mapContainer.getBoundingClientRect();
  const x = e.pageX - rect.left + mapContainer.scrollLeft - 100;
  const y = e.pageY - rect.top + mapContainer.scrollTop - 100;

  preview.style.left = x + "px";
  preview.style.top = y + "px";
});

/* PLACE NOTE */
mapContainer.addEventListener("click", e => {
  if (!placing) return;

  const rect = mapContainer.getBoundingClientRect();
  const x = e.pageX - rect.left + mapContainer.scrollLeft - 100;
  const y = e.pageY - rect.top + mapContainer.scrollTop - 100;

  const newRef = push(notesRef);

  const data = {
    x,
    y,
    image: noteImage,
    reported: false,
    created: Date.now()
  };

  createNote(newRef.key, data);
  update(newRef, data);

  placing = false;
  if (preview) preview.remove();
});

/* CREATE NOTE */
function createNote(id, d) {
  const note = document.createElement("div");
  note.className = "note";
  note.style.left = d.x + "px";
  note.style.top = d.y + "px";

  const img = document.createElement("img");
  img.src = d.image;
  img.style.width = "100%";
  img.style.height = "100%";
  img.style.objectFit = "contain";

  const report = document.createElement("div");
  report.className = "reportBtn";
  report.innerHTML = `<i class="fa-solid fa-flag" style="color:red;"></i>`;

  report.onclick = e => {
    e.stopPropagation();
    update(ref(db, "notes/" + id), { reported: true });
  };

  note.onclick = () => {
    note.classList.toggle("zoom");

    if (!note.querySelector(".dateTag")) {
      const date = document.createElement("div");
      date.className = "dateTag";
      date.innerText = new Date(d.created).toLocaleString();
      note.appendChild(date);
    }
  };

  note.appendChild(img);
  note.appendChild(report);

  map.appendChild(note);
}

/* LOAD */
onValue(notesRef, snapshot => {
  map.querySelectorAll(".note").forEach(n => n.remove());

  snapshot.forEach(child => {
    createNote(child.key, child.val());
  });
});
</script>

</body>
</html>

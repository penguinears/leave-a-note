<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Leave A Note</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

/* HOME SCREEN */
#home {
  position: fixed;
  inset: 0;
  background: white;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  z-index: 20;
}

#home img {
  width: 80%;
  max-width: 500px;
}

/* MAP */
#map-container {
  position: fixed;
  inset: 0;
  overflow: scroll;
  background: #f5f5f5;
  z-index: 1;
}

#map {
  position: relative;
  width: 4000px;
  height: 4000px;
  background: white;
}

/* ADD NOTE BUTTON */
#addNoteBtn {
  position: fixed;
  top: 20px;
  left: 20px;
  padding: 12px 20px;
  background: #222;
  color: white;
  border-radius: 8px;
  cursor: pointer;
  z-index: 10;
  font-weight: bold;
}

/* HINT */
#hint {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #222;
  color: #fff;
  padding: 8px 14px;
  border-radius: 999px;
  font-size: 14px;
  z-index: 11;
  display: none;
}

/* NOTE ON MAP */
.note {
  position: absolute;
  width: 180px;
  height: 180px;
  cursor: pointer;
  transition: transform 0.25s ease;
  transform-origin: center center;
}

.note.zoom {
  transform: scale(3);
  z-index: 9999;
}

/* EDITOR */
#editor {
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.95);
  display: none;
  flex-direction: column;
  align-items: center;
  padding-top: 20px;
  z-index: 30;
}

#canvas {
  border: 2px solid #000;
  background-size: cover;
  background-image: url("images/note-removebg-preview.png");
}

.tools {
  margin-top: 10px;
  display: flex;
  gap: 10px;
}

button {
  padding: 10px 15px;
  font-size: 16px;
  cursor: pointer;
}
</style>
</head>
<body>

<!-- HOME SCREEN -->
<div id="home">
  <img src="images/Leave_A_Note-removebg-preview.png">
</div>

<!-- ADD NOTE BUTTON + HINT -->
<div id="addNoteBtn" style="display:none;">ADD NOTE</div>
<div id="hint">Tap on the map to place your note</div>

<!-- MAP -->
<div id="map-container">
  <div id="map"></div>
</div>

<!-- EDITOR -->
<div id="editor">
  <canvas id="canvas" width="400" height="400"></canvas>

  <div class="tools">
    <button onclick="setTool('draw')">Draw</button>
    <button onclick="setTool('erase')">Erase</button>
    <button onclick="setTool('text')">Text</button>
    <input type="color" id="colorPicker" value="#000000">
    <button onclick="finishNote()">Done</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBzk5p9naKjZndFHfqpldxGUMLBGzkDIsU",
  authDomain: "antianti-69313.firebaseapp.com",
  databaseURL: "https://antianti-69313-default-rtdb.firebaseio.com",
  projectId: "antianti-69313",
  storageBucket: "antianti-69313.firebasestorage.app",
  messagingSenderId: "147709968684",
  appId: "1:147709968684:web:696108f146ecda9b5eec89",
  measurementId: "G-WXRNC9P09F"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const home = document.getElementById("home");
const addNoteBtn = document.getElementById("addNoteBtn");
const hint = document.getElementById("hint");
const mapContainer = document.getElementById("map-container");
const map = document.getElementById("map");
const editor = document.getElementById("editor");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const colorPicker = document.getElementById("colorPicker");

let tool = "draw";
let drawing = false;
let placingNote = false;
let pendingNoteImage = null;

/* HOME SCREEN CLICK */
home.onclick = () => {
  home.style.display = "none";
  addNoteBtn.style.display = "block";
};

/* ADD NOTE */
addNoteBtn.onclick = () => openEditor();

/* OPEN EDITOR – crop to visible note so you can't draw off it */
function openEditor() {
  editor.style.display = "flex";

  const bg = new Image();
  bg.src = "images/note-removebg-preview.png";

  bg.onload = () => {
    const temp = document.createElement("canvas");
    temp.width = bg.width;
    temp.height = bg.height;
    const tctx = temp.getContext("2d");
    tctx.drawImage(bg, 0, 0);

    const data = tctx.getImageData(0, 0, bg.width, bg.height).data;

    let minX = bg.width, minY = bg.height, maxX = 0, maxY = 0;
    for (let y = 0; y < bg.height; y++) {
      for (let x = 0; x < bg.width; x++) {
        const idx = (y * bg.width + x) * 4;
        if (data[idx + 3] > 10) {
          if (x < minX) minX = x;
          if (y < minY) minY = y;
          if (x > maxX) maxX = x;
          if (y > maxY) maxY = y;
        }
      }
    }

    const w = maxX - minX;
    const h = maxY - minY;

    canvas.width = w;
    canvas.height = h;

    ctx.clearRect(0, 0, w, h);
    ctx.drawImage(bg, minX, minY, w, h, 0, 0, w, h);

    ctx.beginPath();
    ctx.rect(0, 0, w, h);
    ctx.clip();
  };
}

/* TOOL SELECT */
window.setTool = function(t) { tool = t; };

/* DRAWING */
canvas.onmousedown = e => {
  drawing = true;
  ctx.beginPath();
  ctx.moveTo(e.offsetX, e.offsetY);
};

canvas.onmousemove = e => {
  if (!drawing) return;
  if (tool === "draw") {
    ctx.strokeStyle = colorPicker.value;
    ctx.lineWidth = 3;
  } else if (tool === "erase") {
    ctx.strokeStyle = "white";
    ctx.lineWidth = 20;
  }
  ctx.lineTo(e.offsetX, e.offsetY);
  ctx.stroke();
};

canvas.onmouseup = () => drawing = false;
canvas.onmouseleave = () => drawing = false;

/* TEXT TOOL */
canvas.onclick = e => {
  if (tool === "text") {
    let t = prompt("Enter text:");
    if (t) {
      ctx.fillStyle = colorPicker.value;
      ctx.font = "20px Arial";
      ctx.fillText(t, e.offsetX, e.offsetY);
    }
  }
};

/* FINISH NOTE */
window.finishNote = function() {
  editor.style.display = "none";
  pendingNoteImage = canvas.toDataURL();
  placingNote = true;
  hint.style.display = "block";
};

/* PLACE NOTE ON MAP + SAVE TO FIREBASE */
function placeNoteAt(pageX, pageY) {
  if (!placingNote || !pendingNoteImage) return;

  const rect = mapContainer.getBoundingClientRect();
  const x = pageX - rect.left + mapContainer.scrollLeft - 90;
  const y = pageY - rect.top + mapContainer.scrollTop - 90;

  const notesRef = ref(db, "notes");
  const newNoteRef = push(notesRef);

  const noteData = { x, y, image: pendingNoteImage };
  set(newNoteRef, noteData);

  createNoteElement(newNoteRef.key, noteData);

  placingNote = false;
  pendingNoteImage = null;
  hint.style.display = "none";
}

/* CREATE NOTE DOM */
function createNoteElement(id, data) {
  const note = document.createElement("img");
  note.src = data.image;
  note.className = "note";
  note.style.left = data.x + "px";
  note.style.top = data.y + "px";
  note.dataset.id = id;

  note.addEventListener("click", e => {
    e.stopPropagation();
    note.classList.toggle("zoom");
  });

  makeDraggable(note);
  map.appendChild(note);
}

/* DRAGGING + SAVE POSITION */
function makeDraggable(el) {
  let offsetX, offsetY;

  el.onmousedown = e => {
    e.stopPropagation();
    offsetX = e.offsetX;
    offsetY = e.offsetY;

    document.onmousemove = ev => {
      const rect = mapContainer.getBoundingClientRect();
      const x = ev.pageX - rect.left + mapContainer.scrollLeft - offsetX;
      const y = ev.pageY - rect.top + mapContainer.scrollTop - offsetY;
      el.style.left = x + "px";
      el.style.top = y + "px";
    };

    document.onmouseup = () => {
      document.onmousemove = null;
      const id = el.dataset.id;
      if (id) {
        update(ref(db, "notes/" + id), {
          x: parseFloat(el.style.left),
          y: parseFloat(el.style.top)
        });
      }
    };
  };
}

/* CLICK / TOUCH TO PLACE */
mapContainer.addEventListener("click", e => {
  if (placingNote) placeNoteAt(e.pageX, e.pageY);
});

mapContainer.addEventListener("touchstart", e => {
  if (!placingNote) return;
  const t = e.touches[0];
  placeNoteAt(t.pageX, t.pageY);
});

/* LOAD NOTES FROM FIREBASE */
onValue(ref(db, "notes"), snapshot => {
  const notes = snapshot.val();
  document.querySelectorAll(".note").forEach(n => n.remove());
  if (!notes) return;
  Object.entries(notes).forEach(([id, data]) => {
    createNoteElement(id, data);
  });
});
</script>

</body>
</html>

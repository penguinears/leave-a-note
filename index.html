<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Leave A Note</title>

<!-- ICONS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

/* HOME */
#home {
  position: fixed;
  inset: 0;
  background: white;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  z-index: 20;
}

/* MAP */
#map-container {
  position: fixed;
  inset: 0;
  overflow: scroll;
  background: #f5f5f5;
}

#map {
  position: relative;
  width: 4000px;
  height: 4000px;
  background: white;
}

/* BUTTON */
#addNoteBtn {
  position: fixed;
  top: 20px;
  left: 20px;
  padding: 12px 20px;
  background: #222;
  color: white;
  border-radius: 8px;
  cursor: pointer;
  z-index: 10;
}

/* NOTES */
.note {
  position: absolute;
  width: 200px;
  height: 200px;
  cursor: pointer;
}

.note.zoom {
  transform: scale(3);
  z-index: 9999;
}

/* REPORT BUTTON */
.reportBtn {
  position: absolute;
  top: 5px;
  right: 5px;
  display: none;
  cursor: pointer;
  font-size: 20px;
}

.note.zoom .reportBtn {
  display: block;
}

/* EDITOR */
#editor {
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.95);
  display: none;
  flex-direction: column;
  align-items: center;
}

#canvas {
  width: 500px;
  height: 500px;
  background: transparent;
}
</style>
</head>

<body>

<div id="home"></div>
<div id="addNoteBtn" style="display:none;">ADD NOTE</div>

<div id="map-container">
  <div id="map"></div>
</div>

<div id="editor">
  <canvas id="canvas" width="500" height="500"></canvas>
  <button onclick="finishNote()">Done</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyBzk5...",
  authDomain: "antianti-69313.firebaseapp.com",
  databaseURL: "https://antianti-69313-default-rtdb.firebaseio.com",
  projectId: "antianti-69313",
  storageBucket: "antianti-69313.firebasestorage.app",
  messagingSenderId: "147709968684",
  appId: "1:147709968684:web:696108f146ecda9b5eec89"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const notesRef = ref(db, "notes");

/* ELEMENTS */
const home = document.getElementById("home");
const addNoteBtn = document.getElementById("addNoteBtn");
const map = document.getElementById("map");
const mapContainer = document.getElementById("map-container");
const editor = document.getElementById("editor");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

/* STATE */
let placing = false;
let noteImage = null;
let preview = null;
const notesCache = new Map();

/* HOME */
home.onclick = () => {
  home.style.display = "none";
  addNoteBtn.style.display = "block";
};

/* OPEN EDITOR */
addNoteBtn.onclick = () => {
  editor.style.display = "flex";
  addNoteBtn.style.display = "none";

  ctx.clearRect(0,0,500,500);
};

/* FINISH */
window.finishNote = () => {
  editor.style.display = "none";
  addNoteBtn.style.display = "block";

  noteImage = canvas.toDataURL();
  placing = true;

  preview = document.createElement("img");
  preview.src = noteImage;
  preview.className = "note";
  preview.style.opacity = "0.5";
  map.appendChild(preview);
};

/* MOVE PREVIEW */
mapContainer.addEventListener("mousemove", e => {
  if (!placing) return;

  const rect = mapContainer.getBoundingClientRect();
  const x = e.pageX - rect.left + mapContainer.scrollLeft - 100;
  const y = e.pageY - rect.top + mapContainer.scrollTop - 100;

  preview.style.left = x + "px";
  preview.style.top = y + "px";
});

/* PLACE */
mapContainer.addEventListener("click", e => {
  if (!placing) return;

  const rect = mapContainer.getBoundingClientRect();
  const x = e.pageX - rect.left + mapContainer.scrollLeft - 100;
  const y = e.pageY - rect.top + mapContainer.scrollTop - 100;

  const newRef = push(notesRef);
  update(newRef, {
    x,
    y,
    image: noteImage,
    reported: false
  });

  placing = false;
  preview.remove();
});

/* LOAD NOTES */
onValue(notesRef, snapshot => {
  snapshot.forEach(child => {
    const id = child.key;
    const data = child.val();

    if (notesCache.has(id)) return;

    const note = document.createElement("div");
    note.className = "note";
    note.style.left = data.x + "px";
    note.style.top = data.y + "px";

    const img = document.createElement("img");
    img.src = data.image;
    img.style.width = "100%";

    const report = document.createElement("div");
    report.className = "reportBtn";
    report.innerHTML = `<i class="fa-solid fa-flag" style="color:red;"></i>`;

    report.onclick = (e) => {
      e.stopPropagation();
      update(ref(db, "notes/" + id), { reported: true });
      alert("Reported");
    };

    note.appendChild(img);
    note.appendChild(report);

    note.onclick = () => {
      note.classList.toggle("zoom");
    };

    map.appendChild(note);
    notesCache.set(id, note);
  });
});
</script>

</body>
</html>

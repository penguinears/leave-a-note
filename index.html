<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Leave A Note</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

#home {
  position: fixed;
  inset: 0;
  background: white;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  z-index: 20;
}

#home img {
  width: 80%;
  max-width: 500px;
}

#map-container {
  position: fixed;
  inset: 0;
  overflow: scroll;
  background: #f5f5f5;
}

#map {
  position: relative;
  width: 4000px;
  height: 4000px;
  background: white;
}

#addNoteBtn {
  position: fixed;
  top: 20px;
  left: 20px;
  padding: 12px 20px;
  background: #222;
  color: white;
  border-radius: 8px;
  cursor: pointer;
  z-index: 10;
}

.note {
  position: absolute;
  width: 200px;
  height: 200px;
  cursor: pointer;
  transition: transform 0.25s ease;
}

.note.zoom {
  transform: scale(3);
  z-index: 9999;
}

.reportBtn {
  position: absolute;
  bottom: 5px;
  right: 5px;
  display: none;
}

.note.zoom .reportBtn {
  display: block;
}

.dateTag {
  position: absolute;
  bottom: 5px;
  left: 5px;
  font-size: 11px;
  background: rgba(0,0,0,0.5);
  color: white;
  padding: 3px 6px;
  border-radius: 5px;
}

#editor {
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.95);
  display: none;
  flex-direction: column;
  align-items: center;
}

#canvas {
  width: 500px;
  height: 500px;
}

.tools {
  margin-top: 10px;
  display: flex;
  gap: 10px;
}
</style>
</head>

<body>

<div id="home">
  <img src="images/Leave_A_Note-removebg-preview.png">
</div>

<div id="addNoteBtn" style="display:none;">ADD NOTE</div>

<div id="map-container">
  <div id="map"></div>
</div>

<div id="editor">
  <canvas id="canvas" width="500" height="500"></canvas>

  <div class="tools">
    <button onclick="setTool('draw')">Draw</button>
    <button onclick="setTool('erase')">Erase</button>
    <button onclick="setTool('text')">Text</button>
    <input type="color" id="colorPicker" value="#000000">
    <input type="range" id="fontSize" min="10" max="60" value="24">
    <button onclick="finishNote()">Done</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBzk5p9naKjZndFHfqpldxGUMLBGzkDIsU",
  authDomain: "antianti-69313.firebaseapp.com",
  databaseURL: "https://antianti-69313-default-rtdb.firebaseio.com",
  projectId: "antianti-69313",
  storageBucket: "antianti-69313.firebasestorage.app",
  messagingSenderId: "147709968684",
  appId: "1:147709968684:web:696108f146ecda9b5eec89"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const notesRef = ref(db, "notes");

const home = document.getElementById("home");
const addNoteBtn = document.getElementById("addNoteBtn");
const map = document.getElementById("map");
const mapContainer = document.getElementById("map-container");
const editor = document.getElementById("editor");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const colorPicker = document.getElementById("colorPicker");
const fontSlider = document.getElementById("fontSize");

let tool = "draw";
let drawing = false;
let placing = false;
let preview = null;
let noteImage = null;
let noteMask = null;

home.onclick = () => {
  home.style.display = "none";
  addNoteBtn.style.display = "block";
};

addNoteBtn.onclick = () => {
  editor.style.display = "flex";
  addNoteBtn.style.display = "none";

  const img = new Image();
  img.src = "images/note-removebg-preview.png";

  img.onload = () => {
    ctx.clearRect(0,0,500,500);
    ctx.drawImage(img,0,0,500,500);

    noteMask = document.createElement("canvas");
    noteMask.width = 500;
    noteMask.height = 500;
    noteMask.getContext("2d").drawImage(img,0,0,500,500);
  };
};

window.setTool = t => tool = t;

/* CLIPPED DRAW */
canvas.onmousedown = e => {
  drawing = true;
  ctx.save();

  ctx.beginPath();
  ctx.rect(0,0,500,500);
  ctx.clip();

  ctx.beginPath();
  ctx.moveTo(e.offsetX, e.offsetY);
};

canvas.onmousemove = e => {
  if (!drawing) return;

  if (tool === "erase") {
    ctx.globalCompositeOperation = "destination-out";
    ctx.lineWidth = 25;
  } else {
    ctx.globalCompositeOperation = "source-over";
    ctx.strokeStyle = colorPicker.value;
    ctx.lineWidth = 3;
  }

  ctx.lineTo(e.offsetX, e.offsetY);
  ctx.stroke();
};

canvas.onmouseup = () => {
  drawing = false;
  ctx.restore();
  ctx.globalCompositeOperation = "source-over";
};

/* TEXT WRAP + FIT */
canvas.onclick = e => {
  if (tool !== "text") return;

  const text = prompt("Text:");
  if (!text) return;

  let size = parseInt(fontSlider.value);
  let maxWidth = 420;
  let lineHeight = size * 1.2;

  function wrap(txt, size) {
    ctx.font = size + "px Arial";
    let words = txt.split(" ");
    let lines = [];
    let line = "";

    for (let w of words) {
      let test = line + w + " ";
      if (ctx.measureText(test).width > maxWidth) {
        lines.push(line);
        line = w + " ";
      } else {
        line = test;
      }
    }
    lines.push(line);
    return lines;
  }

  let lines = wrap(text, size);

  while (lines.length * lineHeight > 420 && size > 10) {
    size--;
    lineHeight = size * 1.2;
    lines = wrap(text, size);
  }

  ctx.font = size + "px Arial";
  ctx.fillStyle = colorPicker.value;

  lines.forEach((line, i) => {
    ctx.fillText(line, e.offsetX, e.offsetY + i * lineHeight);
  });
};

window.finishNote = () => {
  editor.style.display = "none";
  addNoteBtn.style.display = "block";

  noteImage = canvas.toDataURL();
  placing = true;

  preview = document.createElement("img");
  preview.src = noteImage;
  preview.className = "note";
  preview.style.opacity = "0.5";
  map.appendChild(preview);
};

mapContainer.addEventListener("mousemove", e => {
  if (!placing || !preview) return;

  const rect = mapContainer.getBoundingClientRect();
  preview.style.left = (e.pageX - rect.left + mapContainer.scrollLeft - 100) + "px";
  preview.style.top = (e.pageY - rect.top + mapContainer.scrollTop - 100) + "px";
});

mapContainer.addEventListener("click", e => {
  if (!placing) return;

  const rect = mapContainer.getBoundingClientRect();
  const x = e.pageX - rect.left + mapContainer.scrollLeft - 100;
  const y = e.pageY - rect.top + mapContainer.scrollTop - 100;

  const newRef = push(notesRef);

  const data = {
    x, y,
    image: noteImage,
    reported: false,
    created: Date.now()
  };

  createNote(newRef.key, data);
  update(newRef, data);

  placing = false;
  preview.remove();
});

function createNote(id, d) {
  const note = document.createElement("div");
  note.className = "note";
  note.style.left = d.x + "px";
  note.style.top = d.y + "px";

  const img = document.createElement("img");
  img.src = d.image;
  img.style.width = "100%";

  const report = document.createElement("div");
  report.className = "reportBtn";
  report.innerHTML = `<i class="fa-solid fa-flag" style="color:red;"></i>`;

  report.onclick = e => {
    e.stopPropagation();
    update(ref(db, "notes/" + id), { reported: true });
  };

  note.onclick = () => {
    note.classList.toggle("zoom");

    if (!note.querySelector(".dateTag")) {
      const dTag = document.createElement("div");
      dTag.className = "dateTag";
      dTag.innerText = new Date(d.created).toLocaleString();
      note.appendChild(dTag);
    }
  };

  note.appendChild(img);
  note.appendChild(report);
  map.appendChild(note);
}

onValue(notesRef, snapshot => {
  map.querySelectorAll(".note").forEach(n => n.remove());
  snapshot.forEach(child => createNote(child.key, child.val()));
});
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Leave A Note</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

/* HOME SCREEN */
#home {
  position: fixed;
  inset: 0;
  background: white;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  z-index: 20;
}

#home img {
  width: 80%;
  max-width: 500px;
}

/* MAP */
#map-container {
  position: fixed;
  inset: 0;
  overflow: scroll;
  background: #f5f5f5;
  z-index: 1;
}

#map {
  position: relative;
  width: 4000px;
  height: 4000px;
  background: white;
}

/* ADD NOTE BUTTON */
#addNoteBtn {
  position: fixed;
  top: 20px;
  left: 20px;
  padding: 12px 20px;
  background: #222;
  color: white;
  border-radius: 8px;
  cursor: pointer;
  z-index: 10;
  font-weight: bold;
}

/* NOTE */
.note {
  position: absolute;
  width: 180px;
  height: 180px;
  cursor: pointer;
  transition: transform 0.25s ease;
}

.note.zoom {
  transform: scale(3);
  z-index: 9999;
}

/* EDITOR */
#editor {
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.95);
  display: none;
  flex-direction: column;
  align-items: center;
  padding-top: 20px;
  z-index: 30;
}

#canvas {
  width: 400px;
  height: 400px;
  border: 2px solid #000;
  background-size: cover;
  background-image: url("images/note-removebg-preview.png");
}

.tools {
  margin-top: 10px;
  display: flex;
  gap: 10px;
}

button {
  padding: 10px 15px;
  font-size: 16px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home">
  <img src="images/Leave_A_Note-removebg-preview.png">
</div>

<!-- ADD BUTTON -->
<div id="addNoteBtn" style="display:none;">ADD NOTE</div>

<!-- MAP -->
<div id="map-container">
  <div id="map"></div>
</div>

<!-- EDITOR -->
<div id="editor">
  <canvas id="canvas" width="400" height="400"></canvas>

  <div class="tools">
    <button onclick="setTool('draw')">Draw</button>
    <button onclick="setTool('erase')">Erase</button>
    <button onclick="setTool('text')">Text</button>
    <input type="color" id="colorPicker" value="#000000">
    <button onclick="finishNote()">Done</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyBzk5p9naKjZndFHfqpldxGUMLBGzkDIsU",
  authDomain: "antianti-69313.firebaseapp.com",
  databaseURL: "https://antianti-69313-default-rtdb.firebaseio.com",
  projectId: "antianti-69313",
  storageBucket: "antianti-69313.firebasestorage.app",
  messagingSenderId: "147709968684",
  appId: "1:147709968684:web:696108f146ecda9b5eec89"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const notesRef = ref(db, "notes");

/* ELEMENTS */
const home = document.getElementById("home");
const addNoteBtn = document.getElementById("addNoteBtn");
const mapContainer = document.getElementById("map-container");
const map = document.getElementById("map");
const editor = document.getElementById("editor");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const colorPicker = document.getElementById("colorPicker");

/* STATE */
let tool = "draw";
let drawing = false;
let placingMode = false;
let previewNote = null;
let noteImageData = null;

/* HOME */
home.onclick = () => {
  home.style.display = "none";
  addNoteBtn.style.display = "block";
};

/* OPEN EDITOR */
addNoteBtn.onclick = () => {
  editor.style.display = "flex";

  const bg = new Image();
  bg.src = "images/note-removebg-preview.png";
  bg.onload = () => {
    ctx.clearRect(0,0,400,400);
    ctx.drawImage(bg, 0, 0, 400, 400);
  };
};

/* TOOL */
window.setTool = (t) => tool = t;

/* DRAW */
canvas.onmousedown = e => {
  drawing = true;
  ctx.beginPath();
  ctx.moveTo(e.offsetX, e.offsetY);
};

canvas.onmousemove = e => {
  if (!drawing) return;

  if (tool === "draw") {
    ctx.strokeStyle = colorPicker.value;
    ctx.lineWidth = 3;
  } else {
    ctx.strokeStyle = "white";
    ctx.lineWidth = 20;
  }

  ctx.lineTo(e.offsetX, e.offsetY);
  ctx.stroke();
};

canvas.onmouseup = () => drawing = false;

/* TEXT */
canvas.onclick = e => {
  if (tool === "text") {
    const t = prompt("Text:");
    if (t) {
      ctx.fillStyle = colorPicker.value;
      ctx.font = "20px Arial";
      ctx.fillText(t, e.offsetX, e.offsetY);
    }
  }
};

/* FINISH */
window.finishNote = () => {
  editor.style.display = "none";
  noteImageData = canvas.toDataURL();
  placingMode = true;

  previewNote = document.createElement("img");
  previewNote.src = noteImageData;
  previewNote.className = "note";
  previewNote.style.opacity = "0.5";
  map.appendChild(previewNote);
};

/* PREVIEW FOLLOW */
mapContainer.addEventListener("mousemove", e => {
  if (!placingMode || !previewNote) return;

  const rect = mapContainer.getBoundingClientRect();
  const x = e.pageX - rect.left + mapContainer.scrollLeft - 90;
  const y = e.pageY - rect.top + mapContainer.scrollTop - 90;

  previewNote.style.left = x + "px";
  previewNote.style.top = y + "px";
});

/* PLACE */
mapContainer.addEventListener("click", e => {
  if (!placingMode) return;

  const rect = mapContainer.getBoundingClientRect();
  const x = e.pageX - rect.left + mapContainer.scrollLeft - 90;
  const y = e.pageY - rect.top + mapContainer.scrollTop - 90;

  push(notesRef, {
    x: x,
    y: y,
    image: noteImageData
  });

  placingMode = false;
  if (previewNote) previewNote.remove();
});

/* LOAD NOTES */
onValue(notesRef, snapshot => {
  map.innerHTML = "";

  snapshot.forEach(child => {
    const data = child.val();

    const note = document.createElement("img");
    note.src = data.image;
    note.className = "note";
    note.style.left = data.x + "px";
    note.style.top = data.y + "px";

    note.onclick = e => {
      e.stopPropagation();
      note.classList.toggle("zoom");
    };

    map.appendChild(note);
  });
});
</script>

</body>
</html>

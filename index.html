<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Leave A Note</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

/* HOME SCREEN */
#home {
  position: fixed;
  inset: 0;
  background: white;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  z-index: 10;
}

#home img {
  width: 80%;
  max-width: 500px;
}

/* MAP */
#map {
  position: absolute;
  width: 4000px;
  height: 4000px;
  background: white;
  overflow: visible;
}

#map-container {
  position: fixed;
  inset: 0;
  overflow: scroll;
  background: #f5f5f5;
}

/* ADD NOTE BUTTON */
#addNoteBtn {
  position: fixed;
  top: 20px;
  left: 20px;
  padding: 12px 20px;
  background: #222;
  color: white;
  border-radius: 8px;
  cursor: pointer;
  z-index: 5;
  font-weight: bold;
}

/* NOTE FRAME */
.note {
  position: absolute;
  width: 200px;
  height: 200px;
  background-size: cover;
  background-image: url('images/note-removebg-preview.png');
  cursor: pointer;
}

/* EDITOR OVERLAY */
#editor {
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.95);
  display: none;
  flex-direction: column;
  align-items: center;
  padding-top: 20px;
  z-index: 20;
}

#editor canvas {
  border: 2px solid #000;
  background: white;
}

.tools {
  margin-top: 10px;
  display: flex;
  gap: 10px;
}

button {
  padding: 10px 15px;
  font-size: 16px;
  cursor: pointer;
}

#expanded {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 30;
}

#expanded img {
  width: 80%;
  max-width: 600px;
  border: 4px solid white;
}
</style>
</head>
<body>

<!-- HOME SCREEN -->
<div id="home">
  <img src="images/Leave_A_Note-removebg-preview.png">
</div>

<!-- ADD NOTE BUTTON -->
<div id="addNoteBtn" style="display:none;">ADD NOTE</div>

<!-- MAP -->
<div id="map-container">
  <div id="map"></div>
</div>

<!-- EDITOR -->
<div id="editor">
  <canvas id="canvas" width="400" height="400"></canvas>

  <div class="tools">
    <button onclick="setTool('draw')">Draw</button>
    <button onclick="setTool('erase')">Erase</button>
    <button onclick="setTool('text')">Text</button>
    <input type="color" id="colorPicker" value="#000000">
    <button onclick="finishNote()">Done</button>
  </div>
</div>

<!-- EXPANDED NOTE VIEW -->
<div id="expanded" onclick="this.style.display='none'">
  <img id="expandedImg">
</div>

<script>
let tool = "draw";
let drawing = false;
let ctx = canvas.getContext("2d");
let currentNote = null;

/* HOME SCREEN CLICK */
home.onclick = () => {
  home.style.display = "none";
  addNoteBtn.style.display = "block";
};

/* ADD NOTE */
addNoteBtn.onclick = () => {
  openEditor();
};

function openEditor() {
  editor.style.display = "flex";
  ctx.clearRect(0,0,400,400);
  tool = "draw";
}

/* TOOL SELECT */
function setTool(t) {
  tool = t;
}

/* DRAWING */
canvas.onmousedown = e => {
  drawing = true;
  ctx.beginPath();
  ctx.moveTo(e.offsetX, e.offsetY);
};

canvas.onmousemove = e => {
  if (!drawing) return;

  if (tool === "draw") {
    ctx.strokeStyle = colorPicker.value;
    ctx.lineWidth = 3;
  } else if (tool === "erase") {
    ctx.strokeStyle = "white";
    ctx.lineWidth = 20;
  }

  ctx.lineTo(e.offsetX, e.offsetY);
  ctx.stroke();
};

canvas.onmouseup = () => drawing = false;

/* TEXT TOOL */
canvas.onclick = e => {
  if (tool === "text") {
    let t = prompt("Enter text:");
    if (t) {
      ctx.fillStyle = colorPicker.value;
      ctx.font = "20px Arial";
      ctx.fillText(t, e.offsetX, e.offsetY);
    }
  }
};

/* FINISH NOTE */
function finishNote() {
  editor.style.display = "none";

  let img = new Image();
  img.src = canvas.toDataURL();

  let note = document.createElement("div");
  note.className = "note";
  note.style.left = (200 + Math.random()*500) + "px";
  note.style.top = (200 + Math.random()*500) + "px";
  note.style.backgroundImage = `url(${img.src})`;

  note.onclick = () => expandNote(img.src);

  makeDraggable(note);
  map.appendChild(note);
}

/* DRAGGING NOTES */
function makeDraggable(el) {
  let offsetX, offsetY;

  el.onmousedown = e => {
    offsetX = e.offsetX;
    offsetY = e.offsetY;

    document.onmousemove = ev => {
      el.style.left = (ev.pageX - offsetX) + "px";
      el.style.top = (ev.pageY - offsetY) + "px";
    };

    document.onmouseup = () => {
      document.onmousemove = null;
    };
  };
}

/* EXPAND NOTE */
function expandNote(src) {
  expandedImg.src = src;
  expanded.style.display = "flex";
}
</script>

</body>
</html>
